name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive


      - name: Set up Go
        uses: actions/setup-go@v5
        with:
            go-version: '1.25.x'

            
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      - name: Install dependencies
        run: brew install xcodegen || true

      - name: Build IPA
        run: ./apple/Scripts/build-ios-unsigned-local-ipa.sh

      - name: Show build output (debug)
        run: |
          echo "=== apple/.build ==="
          ls -R apple/.build || true

      - name: Find IPA
        run: |
          find apple/.build -name "*.ipa" || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: godwit-ios-ipa
          path: apple/.build
