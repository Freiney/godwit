name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Xcode build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unsigned-local-ipa:
    name: Unsigned Local SOCKS IPA
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache-dependency-path: olcrtc/go.sum

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          go version

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          "$(go env GOPATH)/bin/gomobile" init
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build unsigned local IPA
        env:
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          chmod +x apple/Scripts/*.sh
          ./apple/Scripts/build-ios-unsigned-local-ipa.sh

      - name: Show artifact
        run: ls -lh apple/.build/ios-unsigned-local/Godwit-unsigned-local.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Godwit-iOS-unsigned-local-${{ github.run_number }}
          path: apple/.build/ios-unsigned-local/Godwit-unsigned-local.ipa
          if-no-files-found: error
          retention-days: 14
